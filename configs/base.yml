# MinText base configuration
# All fields with sensible defaults for a small test model.

# Run
run_name: default
model_name: test-tiny
base_output_directory: /tmp/mintext
seed: 0

# Model Architecture
num_hidden_layers: 2
hidden_size: 128
num_attention_heads: 4
# num_key_value_heads: null -> defaults to num_attention_heads (MHA)
intermediate_size: 512
# head_dim: null -> defaults to hidden_size // num_attention_heads
vocab_size: 256
rms_norm_eps: 1e-5
max_position_embeddings: 128
tie_word_embeddings: false

# Data Types
dtype: bfloat16
weight_dtype: float32

# Positional Embeddings (RoPE)
rope_type: default
rope_theta: 10000.0

# Training Loop
steps: 10
log_period: 1
label_smoothing: 0.0

# Optimizer
optimizer: adamw
learning_rate: 1e-3
lr_schedule: cosine
warmup_steps_fraction: 0.1
lr_final_fraction: 0.1
gradient_accumulation_steps: 1
gradient_clip_threshold: 1.0
adam_b1: 0.9
adam_b2: 0.95
adam_eps: 1e-8
weight_decay: 0.1

# Remat
remat_policy: none

# Dataset
dataset_type: synthetic
per_device_batch_size: 2
add_extra_token: true
data_path: ""
data_cache_dir: ""
data_split: "99,1,0"
num_data_epochs: 1
grain_worker_count: 4
grain_prefetch_buffer_size: 500

# Mesh / Parallelism
ici_data_parallelism: 1
ici_fsdp_parallelism: -1
ici_tensor_parallelism: 1
scan_layers: true

# Sharding (empty -> uses defaults)
logical_axis_rules: []

# Checkpointing
enable_checkpointing: true
async_checkpointing: true
checkpoint_period: 1000
checkpoint_dir: ""
max_checkpoints: 5
load_checkpoint: ""        # Orbax checkpoint path (full state, or params-only with load_params_only)
load_hf_checkpoint: ""     # HF SafeTensors dir (params-only, resets optimizer + step)
load_params_only: false    # With load_checkpoint: load only params, reset optimizer + step

# Logging
enable_tensorboard: true
tensorboard_dir: ""
log_dir: ""

# Profiling
enable_profiler: false
profiler_steps: 5
skip_first_n_profiler_steps: 1
