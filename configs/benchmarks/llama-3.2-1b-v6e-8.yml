# Llama 3.2 1B benchmark config for TPU v6e-8
# Usage: python -m mintext.train --config configs/benchmarks/llama-3.2-1b-v6e-8.yml
base_config: ../base.yml

# Model
model_name: meta-llama-3.2-1b
model_type: llama3
num_hidden_layers: 16
hidden_size: 2048
num_attention_heads: 32
num_key_value_heads: 8
intermediate_size: 8192
head_dim: 64
vocab_size: 128256
rms_norm_eps: 1e-5
tie_word_embeddings: true
rope_type: llama3
rope_theta: 500000.0
rope_scaling_factor: 32.0
rope_original_max_position_embeddings: 8192
rope_llama3_low_freq_factor: 1.0
rope_llama3_high_freq_factor: 4.0

# Benchmark-tuned settings
seq_length: 2048
per_device_batch_size: 4
dtype: bfloat16
weight_dtype: float32

# Performance
remat_policy: full
scan_layers: true

# Mesh: pure FSDP on 8 chips
ici_data_parallelism: 1
ici_fsdp_parallelism: -1
ici_tensor_parallelism: 1

# Training
steps: 30
log_period: 1
learning_rate: 3e-4
weight_decay: 0.1
warmup_steps_fraction: 0.01

# Synthetic data for benchmarking
dataset_type: synthetic
enable_checkpointing: false
enable_tensorboard: false
enable_profiler: false
