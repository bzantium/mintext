# DeepSeek-V3 671B configuration
base_config: ../base.yml

model_name: deepseek-v3
model_type: deepseek_v3
num_hidden_layers: 61
hidden_size: 7168
num_attention_heads: 128
intermediate_size: 18432
vocab_size: 129280
max_position_embeddings: 4096
rms_norm_eps: 1e-6
tie_word_embeddings: false

# MLA
attention_type: mla
q_lora_rank: 1536
kv_lora_rank: 512
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128
rope_interleave: false

# MoE
num_experts: 256
num_experts_per_tok: 8
moe_intermediate_size: 2048
n_shared_experts: 1
n_group: 8
topk_group: 4
first_k_dense_replace: 3
routed_scaling_factor: 2.5
norm_topk_prob: true
e_score_correction_bias_update_rate: 0.001

# RoPE
rope_type: default
rope_theta: 10000.0

# Training defaults
per_device_batch_size: 1
learning_rate: 1e-4
weight_decay: 0.1
warmup_steps_fraction: 0.01
remat_policy: full
scan_layers: true
